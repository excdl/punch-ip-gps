<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能打卡系統</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
body {font-family:"Arial","Noto Sans TC",sans-serif;background:#f0f4f8;display:flex;justify-content:center;padding:20px;margin:0;}
.card {background:#fff;width:95%;max-width:480px;border-radius:20px;padding:25px 20px;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 15px 30px rgba(0,0,0,0.15);}
#userInfo {font-size:28px;font-weight:bold;text-align:center;color:#2c3e50;}
#dateTime {font-size:22px;color:#7f8c8d;text-align:center;}
#statusInfo {font-size:20px;color:white;padding:8px 25px;border-radius:25px;text-align:center;min-width:180px;}
.buttons-container {display:flex;gap:15px;width:100%;}
.buttons-container button {flex:1;padding:15px 0;font-size:22px;font-weight:bold;border-radius:12px;border:none;cursor:pointer;color:white;transition:all 0.2s;}

/* 🚀 優化點：更改按鈕顏色（上班：橘色 / 下班：藍色） */
#btnStart {background: linear-gradient(135deg, #ff9f43, #ee5253);}
#btnEnd {background: linear-gradient(135deg, #3498db, #2980b9);}

button:disabled {opacity:0.5;cursor:not-allowed;}
#todayRecords {width:100%;background:#fafafa;border-radius:14px;padding:15px;border:1px solid #ddd;font-size:18px;text-align:left;}
#todayRecords span {display:block;margin-bottom:5px;padding-left:5px;border-left:3px solid #3498db;}

/* 主管審批按鈕 */
#btnApprove {
    margin-top:10px;
    padding:12px 20px;
    font-size:18px;
    font-weight:bold;
    border-radius:10px;
    background:linear-gradient(145deg,#8e44ad,#663399);
    color:white;
    display:none;
    width:100%;
    cursor:pointer;
    border:none;
}
#btnApprove:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>
<body>
<div class="card">
  <div id="userInfo">載入使用者資訊中...</div>
  <div id="statusInfo">定位確認中…</div>
  <div id="dateTime">載入中…</div>
  <div class="buttons-container">
    <button id="btnStart" disabled>定位中…</button>
    <button id="btnEnd" disabled>定位中…</button>
  </div>
  <div id="todayRecords">今日打卡紀錄（點擊更新）</div>
  <button id="btnApprove">查看 | 簽核</button>
</div>
 
<script>
const API_ENDPOINT="https://script.google.com/macros/s/AKfycbxg8yvQpBW0WMhHheUNKLGZ4fezYSr3JpnWsUvAKKdEmxgCbJcdF4q__GWGlPqBNWhK/exec";

let userId="", userName="", dataReady=false;
let statusLoaded=false;
let MANAGERS = [];
let isManager = false;

/* ===== GPS 即時系統 ===== */
let lastGPS = null;
let gpsAccuracy = null;
let cachedIP = "";
let lastRangeStatus = null;

const btnStart=document.getElementById("btnStart");
const btnEnd=document.getElementById("btnEnd");
const userInfo=document.getElementById("userInfo");
const statusInfo=document.getElementById("statusInfo");
const dateTime=document.getElementById("dateTime");
const todayRecords=document.getElementById("todayRecords");

/* ===== 讀取主管 ===== */
async function loadManagers(){
  try{
    const res = await fetch(`${API_ENDPOINT}?action=getManagers`);
    MANAGERS = await res.json();
    isManager = MANAGERS.includes(userId);
    if (isManager) {
      document.getElementById("btnApprove").style.display = "block";
    }
  }catch(err){
    console.error("讀取主管失敗", err);
    MANAGERS = [];
  }
}

/* ===== 日期 ===== */
function getTodayString(){
  const d=new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
}

/* ===== 按鈕狀態還原與文字鎖定 ===== */
function setButtonsLock(lock, textStart = "上班", textEnd = "下班"){
  btnStart.disabled = lock;
  btnEnd.disabled = lock;
  btnStart.textContent = textStart;
  btnEnd.textContent = textEnd;
}

/* ===== 時間 ===== */
function updateDateTime(){
  const now=new Date();
  dateTime.textContent=now.toLocaleString("zh-TW",{hour12:false});
}
setInterval(updateDateTime,1000);
updateDateTime();

/* ===== IP ===== */
async function preloadIP(){
  try{
    const res=await fetch("https://api.ipify.org?format=json");
    const data=await res.json();
    cachedIP = data.ip;
  }catch{}
}
function getIP(){
  return cachedIP || "";
}

/* ===== GPS 資料更新邏輯 ===== */
function updateGPSData(pos) {
  gpsAccuracy = pos.coords.accuracy;
  lastGPS = { lat: pos.coords.latitude, lng: pos.coords.longitude };
}

/* ===== GPS ===== */
function initGPSWatcher(){
  if(!navigator.geolocation) return;

  navigator.geolocation.watchPosition(
    pos=>{
      const isFirstLocation = (lastGPS === null); 
      updateGPSData(pos);
      updateStatus(isFirstLocation); 
    },
    err=>console.warn("GPS錯誤:",err),
    {
      enableHighAccuracy:true,
      maximumAge:0,
      timeout:5000
    }
  );
}

/* ===== LIFF ===== */
async function initUser(){
  await liff.init({ liffId: "2010795326-ID1oydWL" });

  if (!liff.isLoggedIn()) {
    await liff.login();
  }

  const profile = await liff.getProfile();
  userId = profile.userId;
  userName = profile.displayName;

  userInfo.textContent = `${userName} 您好`;
}

/* ===== 狀態 (修改順序：先判斷 IP 是否符合，符合即先顯示有效打卡區) ===== */
async function updateStatus(forceRefresh = false) {
  if (!cachedIP) {
    statusInfo.textContent = "正在檢查網路狀態...";
    statusInfo.style.background = "#95a5a6";
    setButtonsLock(true, "同步中...", "同步中...");
    statusLoaded = false;
    return;
  }

  // 修改：優先判斷固定 IP (例如公司固定 IP) 如果符合，直接判定有效打卡區，不需等待 GPS
  if (cachedIP === "你的公司固定IP") {
    lastRangeStatus = "有效打卡區";
    statusInfo.style.background = "#2ecc71";
    statusInfo.textContent = "有效打卡區 (IP連線)";
    setButtonsLock(false, "上班", "下班");
    statusLoaded = true;
    return;
  }

  // 若 IP 不符合，則繼續原本的 GPS 定位檢查
  if (!lastGPS) {
    statusInfo.textContent = "定位中…";
    statusInfo.style.background = "#95a5a6";
    setButtonsLock(true, "定位中…", "定位中…");
    statusLoaded = false;
    return;
  }

  try {
    const res = await fetch(
      `${API_ENDPOINT}?action=check&lat=${lastGPS.lat}&lng=${lastGPS.lng}&ip=${getIP()}`
    );
    
    const data = await res.json();
    const newStatus = data.rangeStatus;
    if (!newStatus) return;

    if (!forceRefresh && newStatus === lastRangeStatus) return;
    lastRangeStatus = newStatus;

    if (newStatus === "有效打卡區") {
      statusInfo.style.background = "#2ecc71";
      statusInfo.textContent = "有效打卡區";
      setButtonsLock(false, "上班", "下班");
    } else {
      statusInfo.style.background = "#e74c3c";
      const distText = data.distance ? ` (${data.distance} 公尺)` : "";
      statusInfo.textContent = "無效打卡區" + distText;

      if (isManager) {
        setButtonsLock(false, "上班 (主管)", "下班 (主管)");
      } else {
        setButtonsLock(true, "上班", "下班");
      }
    }

    statusLoaded = true;

  } catch (err) {
    console.warn("狀態更新失敗:", err);
  }
}

/* ===== 今日紀錄 ===== */
async function updateTodayRecords(){
  todayRecords.innerHTML="載入中...";
  try{
    const res = await fetch(`${API_ENDPOINT}?action=getToday&userId=${userId}&date=${getTodayString()}`);
    const data = await res.json();

    if(!data.length){
      todayRecords.innerHTML="今日打卡紀錄：無";
      return;
    }

    todayRecords.innerHTML="今日打卡紀錄：<br>";

    data.forEach(r=>{
      let color="#3498db";
      if(r.status==="下班") color="#2ecc71";
      if(r.company.includes("錯誤")) color="#e67e22";
      todayRecords.innerHTML+=`<span style="border-left-color:${color}">${r.status}：${r.time}（${r.company}）</span>`;
    });
  }catch{
    todayRecords.innerHTML="今日打卡紀錄：讀取失敗";
  }
}

/* ===== LINE 訊息 ===== */
async function sendSelfMessage(record){
  if(!liff.isInClient()) return;

  let headerColor = "#3498db"; 
  if(record.status === "下班") headerColor = "#2ecc71"; 
  if(record.rangeStatus !== "有效打卡區") headerColor = "#e67e22"; 

  let reasonText = record.rangeStatus !== "有效打卡區" ? "異常原因：超出打卡區" : "";

  try{
    await liff.sendMessages([{
      type:'flex',
      altText:'打卡通知',
      contents:{
        type:"bubble",
        header:{
          type:"box",
          layout:"vertical",
          contents:[{
            type:"text",
            text:`${record.userName} 已打卡`,
            weight:"bold",
            size:"lg",
            color:"#ffffff"
          }],
          backgroundColor: headerColor,
          paddingAll:"12px"
        },
        body:{
          type:"box",
          layout:"vertical",
          spacing:"md",
          contents:[
            {type:"text", text:`狀態：${record.status}`},
            {type:"text", text:`時間：${record.date} ${record.time}`},
            {type:"text", text:`位置：${record.company}`},
            ...(reasonText ? [{type:"text", text: reasonText, color:"#e67e22"}] : [])
          ]
        }
      }
    }]);
    await new Promise(r => setTimeout(r, 800));
    console.log("訊息已送出");
  }catch(err){
    console.error("LIFF 訊息傳送失敗:", err);
  }
}

/* ===== 打卡 ===== */
async function clockInOut(status){
  if(!dataReady || !statusLoaded){
    Swal.fire({icon:"info",title:"資料讀取中或定位中",timer:1500,showConfirmButton:false});
    return;
  }

  if (lastRangeStatus !== "有效打卡區" && !isManager) {
    Swal.fire({
      icon: "warning",
      title: "目前為無效打卡區",
      text: "僅主管可打卡",
      timer: 1500,
      showConfirmButton: false
    });
    return;
  }

  const btn = status==="上班"?btnStart:btnEnd;
  btn.disabled = true;
  const originalText = btn.textContent;

  let sec = 3;
  const timer = setInterval(()=>{
    btn.textContent = `打卡中… ${sec}s`;
    sec--;
    if(sec<0) clearInterval(timer);
  },1000);

  try{
    const res = await fetch(API_ENDPOINT, {
      method:"POST",
      body: JSON.stringify({userId,userName,ip:getIP(),gps:lastGPS || {lat:0, lng:0},status})
    });

    const data = await res.json();
    const actuallyUpdated = data.message && (data.message.includes("已更新") || data.message.includes("成功"));

    if(actuallyUpdated){
      const record = {
        userName,
        status: data.status,
        date: data.date,
        time: data.time,
        company: data.company || "未知",
        rangeStatus: data.rangeStatus
      };

      if(data.rangeStatus === "有效打卡區"){
        Swal.fire({icon:"success",title:"打卡成功",timer:2000,showConfirmButton:false});
      } else {
        Swal.fire({icon:"warning",title:"打卡無效",timer:2000,showConfirmButton:false});
      }

      sendSelfMessage(record);
      updateTodayRecords();
      updateStatus();
    }

  }catch(err){
    Swal.fire({icon:"error",title:"打卡失敗",timer:2000,showConfirmButton:false});
  } finally {
    clearInterval(timer);
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

btnStart.onclick = () => clockInOut("上班");
btnEnd.onclick = () => clockInOut("下班");

document.getElementById("btnApprove").onclick = () => {
  window.location.href = "https://script.google.com/macros/s/AKfycbwe5O6ktoaMPNsbT-U8kyruMisF4pd9ezoEsW07ofMP4wKzj4veHhjsc9-cmeddUU9mgQ/exec";
};

/* ===== 初始化邏輯 ===== */
window.onload = async () => {
  statusInfo.textContent = "系統初始化中…";
  
  try {
    const promises = [
      preloadIP(),          // IP 抓取
      initUser(),           // LIFF 初始化 (LINE 姓名)
      loadManagers()        // 讀取主管名單
    ];

    const gpsPromise = new Promise((resolve) => {
      if (!navigator.geolocation) resolve();
      navigator.geolocation.getCurrentPosition(
        pos => { updateGPSData(pos); resolve(); },
        () => resolve(), 
        { enableHighAccuracy: true, timeout: 5000 }
      );
      initGPSWatcher(); 
    });
    promises.push(gpsPromise);

    await Promise.all(promises);
    dataReady = true;

    // 優先更新狀態 (此時若 IP 符合會直接顯示有效打卡區)
    updateStatus(true);

    // 非同步載入今日紀錄
    updateTodayRecords();

  } catch (error) {
    console.error("初始化失敗", error);
  }
};
</script>
</body>
</html>
